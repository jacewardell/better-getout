name: Fetch venue data

on:
  schedule:
    - cron: "0 13 * * *"   # daily ~06:00 PT / 07:00 MT
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch + normalize venue data
        run: node fetch-data.js

      - name: Commit changed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Update venue data ($(date -u +%Y-%m-%d))"
            git push
          fi
